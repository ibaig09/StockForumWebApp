<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Hexagon mark -->
  <polygon points="30,4 52,17 52,43 30,56 8,43 8,17" fill="#4f46e5"/>
  <!-- Candle 1 — green (bullish) -->
  <line x1="18" y1="21" x2="18" y2="39" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="15.5" y="26" width="5" height="9" fill="#4ade80" rx="1"/>
  <!-- Candle 2 — green (bullish, taller) -->
  <line x1="30" y1="17" x2="30" y2="41" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="27.5" y="22" width="5" height="13" fill="#4ade80" rx="1"/>
  <!-- Candle 3 — red (bearish) -->
  <line x1="42" y1="20" x2="42" y2="38" stroke="#f87171" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="39.5" y="26" width="5" height="8" fill="#f87171" rx="1"/>
  <!-- Wordmark -->
  <text x="62" y="36" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="22" letter-spacing="-0.5" fill="#ffffff">Chart</text>
  <text x="118" y="36" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="22" letter-spacing="-0.5" fill="#818cf8">Hive</text>
</svg>
